    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* ===== iOS / iPhone Optimizations ===== */

        html {
            /* Prevent overscroll bounce on iOS */
            overscroll-behavior: none;
            /* Smooth momentum scrolling */
            -webkit-overflow-scrolling: touch;
        }

        body {
            background-color: #e5e7eb;
            /* gray-200 */
            margin: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            /* Prevent text selection on long-press (iOS) */
            -webkit-user-select: none;
            user-select: none;
            /* Prevent iOS callout on long-press */
            -webkit-touch-callout: none;
            /* Prevent pull-to-refresh */
            overscroll-behavior-y: contain;
        }

        /* Allow text selection in inputs/textareas */
        input,
        textarea,
        [contenteditable] {
            -webkit-user-select: text;
            user-select: text;
        }

        /* Prevent iOS zoom on input focus (font-size must be >= 16px) */
        input,
        select,
        textarea {
            font-size: 16px !important;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="search"],
        input[type="password"],
        textarea,
        select {
            font-size: 16px !important;
        }

        .dark body {
            background-color: #000000;
        }

        /* 
         * Safe area: When running as standalone PWA on iPhone with notch/Dynamic Island,
         * add extra top padding to all headers that use pt-8 to account for the notch.
         * This is applied via CSS so no component changes are needed.
         */
        @supports (padding-top: env(safe-area-inset-top)) {
            @media all and (display-mode: standalone),
            all and (display-mode: fullscreen) {

                /* Boost header padding for safe area on iPhone */
                .pt-8 {
                    padding-top: calc(2rem + env(safe-area-inset-top)) !important;
                }

                /* Ensure bottom nav doesn't overlap the home indicator */
                .pb-safe-auto {
                    padding-bottom: env(safe-area-inset-bottom, 0px) !important;
                }
            }
        }

        /* Custom Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .active-scale:active {
            transform: scale(0.96);
        }
    </style>

    <!-- Service Worker Registration for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Unregister old service workers first to clear stale cache
                navigator.serviceWorker.getRegistrations().then((registrations) => {
                    for (let registration of registrations) {
                        registration.unregister();
                    }
                    console.log('Old ServiceWorkers unregistered, re-registering fresh...');
                    navigator.serviceWorker.register('./sw.js')
                        .then((registration) => {
                            console.log('ServiceWorker registration successful with scope: ', registration.scope);
                        })
                        .catch((err) => {
                            console.log('ServiceWorker registration failed: ', err);
                        });
                });
            });
        }

        // Detect standalone PWA mode (launched from home screen)
        function isStandalone() {
            return window.matchMedia('(display-mode: standalone)').matches
                || window.matchMedia('(display-mode: fullscreen)').matches
                || window.navigator.standalone === true;
        }

        if (isStandalone()) {
            // Lock orientation to portrait if supported
            // NOTE: We do NOT use the Fullscreen API here — on iOS Safari,
            // requestFullscreen() hides the native status bar. In standalone
            // mode the app is already full-screen with the status bar visible
            // on top, which is the desired behaviour.
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(() => { });
            }
        }

        /*
         * Keyboard / visualViewport fix for iOS Safari.
         *
         * On iOS, when the soft keyboard opens, the *layout* viewport (and
         * therefore `100vh` / `100dvh`) does NOT shrink — only the *visual*
         * viewport does. This creates a gap between the app content and the
         * keyboard. We listen to `window.visualViewport` and set a CSS custom
         * property `--app-height` that tracks the actual visible height, then
         * the app shell uses it instead of `100dvh`.
         */
        (function () {
            function setAppHeight() {
                var vh = (window.visualViewport && window.visualViewport.height)
                    ? window.visualViewport.height
                    : window.innerHeight;
                document.documentElement.style.setProperty('--app-height', vh + 'px');
            }
            setAppHeight();
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', setAppHeight);
                window.visualViewport.addEventListener('scroll', setAppHeight);
            }
            window.addEventListener('resize', setAppHeight);
            window.addEventListener('orientationchange', function () {
                setTimeout(setAppHeight, 200);
            });
        })();
    </script>
