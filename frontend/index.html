<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <!-- Single theme-color; the inline theme script below keeps it in sync
         with the user's app-level theme preference (from localStorage). -->
    <meta name="theme-color" content="#faf9f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vayu Design">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Vayu Design for living</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon.png">

    <script>
        // Apply theme immediately to prevent flash during React mount
        try {
            const savedTheme = localStorage.getItem('vayu_theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#121212');
            } else {
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#faf9f6');
            }
        } catch (e) {
            console.warn('Failed to apply theme', e);
        }
    </script>

    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* ===== iOS / iPhone Optimizations ===== */

        html {
            /* Prevent overscroll bounce / rubber-banding on iOS.
               `none` is stronger than `contain` and stops the top-overscroll
               that was revealing blank space below the app shell. */
            overscroll-behavior: none;
            /* Fix the layout viewport so it can't be shifted by overscroll. */
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #faf9f6;
            margin: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            /* Prevent text selection on long-press (iOS) */
            -webkit-user-select: none;
            user-select: none;
            /* Prevent iOS callout on long-press */
            -webkit-touch-callout: none;
            /* Prevent pull-to-refresh and scroll-chaining to the root */
            overscroll-behavior: contain;
            /* Prevent native pinch-zoom across the UI */
            touch-action: pan-x pan-y;
            /* Keep the body inside the fixed html viewport */
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Allow text selection in inputs/textareas */
        input,
        textarea,
        [contenteditable] {
            -webkit-user-select: text;
            user-select: text;
        }

        /* Dark mode fallback for body before React loads */
        html.dark body {
            background-color: #121212;
        }

        /* Prevent double-tap-to-zoom completely on the app
           (merged into the primary `body` rule at line 73 to avoid duplicate selector) */

        /* Prevent iOS zoom on input focus (font-size must be >= 16px) */
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="search"],
        input[type="password"],
        input[type="date"],
        input[type="time"],
        input[type="datetime-local"],
        textarea,
        select {
            font-size: 16px !important;
        }

        /* 
         * Safe area: When running as standalone PWA on iPhone with notch/Dynamic Island,
         * add extra top padding to all headers that use pt-8 to account for the notch.
         * This is applied via CSS so no component changes are needed.
         */
        @supports (padding-top: env(safe-area-inset-top)) {
            @media all and (display-mode: standalone),
            all and (display-mode: fullscreen) {

                /* Boost header padding for safe area on iPhone */
                .pt-8 {
                    padding-top: calc(2rem + env(safe-area-inset-top)) !important;
                }

                /* Ensure bottom nav doesn't overlap the home indicator */
                .pb-safe-auto {
                    padding-bottom: env(safe-area-inset-bottom, 0px) !important;
                }
            }
        }

        /* Custom Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .active-scale:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <!-- Service Worker Registration for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.getRegistrations().then((registrations) => {
                    // Only unregister service workers that are NOT our current sw.js
                    // (e.g. old ones from different scopes) to avoid killing the
                    // active worker on every page load.
                    const unregisterPromises = registrations
                        .filter((reg) => !reg.active || !reg.active.scriptURL.includes('sw.js'))
                        .map((reg) => reg.unregister());
                    Promise.all(unregisterPromises).then(() => {
                        navigator.serviceWorker.register('./sw.js')
                            .then((registration) => {
                                console.log('ServiceWorker registration successful with scope: ', registration.scope);
                            })
                            .catch((err) => {
                                console.log('ServiceWorker registration failed: ', err);
                            });
                    });
                });
            });
        }

        /*
         * Keyboard / visualViewport fix for iOS Safari.
         *
         * On iOS, when the soft keyboard opens, the *layout* viewport (and
         * therefore `100vh` / `100dvh`) does NOT shrink — only the *visual*
         * viewport does. This creates a gap between the app content and the
         * keyboard. We listen to `window.visualViewport` and set a CSS custom
         * property `--app-height` that tracks the actual visible height, then
         * the app shell uses it instead of `100dvh`.
         */
        (function () {
            function setAppHeight() {
                var vh = (globalThis.visualViewport && globalThis.visualViewport.height)
                    ? globalThis.visualViewport.height
                    : globalThis.innerHeight;
                document.documentElement.style.setProperty('--app-height', vh + 'px');
                if (globalThis.scrollY > 0) {
                    globalThis.scrollTo(0, 0);
                }
            }
            setAppHeight();
            if (globalThis.visualViewport) {
                globalThis.visualViewport.addEventListener('resize', setAppHeight);
                globalThis.visualViewport.addEventListener('scroll', setAppHeight);
            }
            globalThis.addEventListener('resize', setAppHeight);
            globalThis.addEventListener('orientationchange', function () {
                setTimeout(setAppHeight, 200);
            });
        })();
    </script>

    <!-- Orientation lock: uses top-level await, so this script is a module -->
    <script type="module">
        function isStandalone() {
            return globalThis.matchMedia('(display-mode: standalone)').matches
                || globalThis.matchMedia('(display-mode: fullscreen)').matches
                || globalThis.navigator.standalone === true;
        }

        // NOTE: We do NOT use the Fullscreen API here — on iOS Safari,
        // requestFullscreen() hides the native status bar. In standalone
        // mode the app is already full-screen with the status bar visible
        // on top, which is the desired behaviour.
        if (isStandalone() && screen.orientation?.lock) {
            try {
                await screen.orientation.lock('portrait');
            } catch (e) {
                console.warn('Orientation lock skipped', e);
            }
        }
    </script>
</body>

</html>
